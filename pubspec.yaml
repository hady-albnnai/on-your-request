name: bkhedmtak
description: تطبيق بخدمتك – سوق الخدمات المحلي في السويداء
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # ── State Management ────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage ───────────────────────────────────────────────────
  shared_preferences: ^2.5.3

  # ── Image ───────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1

  # ── UI & Fonts ──────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # ── Utils ───────────────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
