name: bkhedmtak
description: تطبيق بخدمتك – سوق الخدمات المحلي في السويداء
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage ─────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Image ─────────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.3.1

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utils ─────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
